name: Slack Red Alert CI Pipeline
run-name: Running pipeline for ${{ github.actor }}'s push
on:
    push:
        paths:
            - "**/*.go"
            - "go.mod"
            - "go.sum"
            - ".github/workflows/ci.yml"
    pull_request:
        branches: [main]
jobs:
    lint-go-code:
        name: Run linting and code quality checks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum
            - name: Download dependencies
              run: go mod download
            - name: Run go fmt check
              run: |
                  FILES=$(find . -name "*.go" -not -path "./vendor/*")
                  if [ -n "$(gofmt -s -l $FILES)" ]; then
                    echo "Go code is not formatted:"
                    gofmt -s -d $FILES
                    exit 1
                  fi
            - name: Run go vet
              run: go vet ./...

    build-binary:
        name: Build binary
        runs-on: ubuntu-latest
        needs: [lint-go-code]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum
            - name: Download dependencies
              run: go mod download
            - name: Build binary
              env:
                  CGO_ENABLED: 0
              run: |
                  echo "Building static binary..."
                  mkdir -p bin
                  go build -tags netgo -ldflags="-w -s" -o bin/slack-red-alert .
            - name: Verify binary
              run: |
                  echo "Built binary:"
                  ls -lh bin/
                  file bin/slack-red-alert
