<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Night sky gradient -->
    <radialGradient id="skyGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="60%" stop-color="#0d0618"/>
      <stop offset="100%" stop-color="#030108"/>
    </radialGradient>

    <!-- Alert pulse glow behind scene -->
    <radialGradient id="alertGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2200" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>

    <!-- Interceptor missile trail gradient -->
    <linearGradient id="interceptorTrail" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cfff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00cfff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>

    <!-- Threat missile trail gradient -->
    <linearGradient id="threatTrail" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4400" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="1"/>
    </linearGradient>

    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1030"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>

    <!-- Explosion glow -->
    <radialGradient id="explosionGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ffe066" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>

    <!-- Launcher tube gradient -->
    <linearGradient id="tubeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a1f3d"/>
      <stop offset="40%" stop-color="#4a3a6a"/>
      <stop offset="100%" stop-color="#1a1228"/>
    </linearGradient>

    <!-- Radar dish gradient -->
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a2d5a"/>
      <stop offset="100%" stop-color="#1e1530"/>
    </linearGradient>

    <!-- Filter: glow for interceptor -->
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filter: glow for explosion -->
    <filter id="glowExplosion" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filter: glow for threat -->
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filter: soft city glow -->
    <filter id="cityGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded square clip -->
    <clipPath id="roundedSquare">
      <rect width="1024" height="1024" rx="180" ry="180"/>
    </clipPath>

    <!-- Stars pattern -->
    <pattern id="stars" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="30" r="1.2" fill="white" opacity="0.7"/>
      <circle cx="80" cy="15" r="0.8" fill="white" opacity="0.5"/>
      <circle cx="140" cy="55" r="1.4" fill="white" opacity="0.8"/>
      <circle cx="60" cy="90" r="0.9" fill="white" opacity="0.4"/>
      <circle cx="170" cy="80" r="1.1" fill="white" opacity="0.6"/>
      <circle cx="110" cy="130" r="0.7" fill="white" opacity="0.5"/>
      <circle cx="30" cy="160" r="1.3" fill="white" opacity="0.7"/>
      <circle cx="190" cy="150" r="0.8" fill="white" opacity="0.4"/>
      <circle cx="100" cy="180" r="1.0" fill="white" opacity="0.6"/>
      <circle cx="50" cy="120" r="0.6" fill="white" opacity="0.5"/>
      <circle cx="155" cy="20" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="75" cy="170" r="0.9" fill="white" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Clip everything to rounded square app icon shape -->
  <g clip-path="url(#roundedSquare)">

    <!-- Background sky -->
    <rect width="1024" height="1024" fill="url(#skyGrad)"/>

    <!-- Stars -->
    <rect width="1024" height="820" fill="url(#stars)" opacity="0.9"/>

    <!-- Alert ambient glow (red tint over whole scene) -->
    <rect width="1024" height="1024" fill="url(#alertGlow)"/>

    <!-- =================== CITYSCAPE SILHOUETTE =================== -->
    <g filter="url(#cityGlow)" opacity="0.55">
      <!-- City buildings silhouette -->
      <polygon points="0,820 0,740 40,740 40,700 70,700 70,720 100,720 100,680 130,680 130,700 160,700 160,740 190,740 190,720 220,720 220,760 250,760 250,710 280,710 280,760 310,760 310,700 340,700 340,680 370,680 370,660 400,660 400,700 430,700 430,720 460,720 460,740 490,740 490,760 510,760 510,720 540,720 540,700 570,700 570,680 600,680 600,720 630,720 630,700 660,700 660,740 700,740 700,720 730,720 730,700 760,700 760,720 790,720 790,740 820,740 820,720 850,720 850,740 880,740 880,760 910,760 910,730 940,730 940,750 980,750 980,760 1024,760 1024,820" fill="#1a1030"/>
      <!-- Building windows - tiny dots of warm light -->
      <rect x="42" y="708" width="5" height="5" fill="#ffcc44" opacity="0.6"/>
      <rect x="52" y="708" width="5" height="5" fill="#ffcc44" opacity="0.4"/>
      <rect x="104" y="688" width="5" height="5" fill="#ffcc44" opacity="0.7"/>
      <rect x="114" y="700" width="5" height="5" fill="#ffcc44" opacity="0.3"/>
      <rect x="262" y="718" width="5" height="5" fill="#ffcc44" opacity="0.6"/>
      <rect x="373" y="668" width="5" height="5" fill="#ffcc44" opacity="0.5"/>
      <rect x="383" y="678" width="5" height="5" fill="#ffcc44" opacity="0.7"/>
      <rect x="544" y="706" width="5" height="5" fill="#ffcc44" opacity="0.5"/>
      <rect x="574" y="688" width="5" height="5" fill="#ffcc44" opacity="0.6"/>
      <rect x="736" y="706" width="5" height="5" fill="#ffcc44" opacity="0.4"/>
      <rect x="762" y="726" width="5" height="5" fill="#ffcc44" opacity="0.6"/>
      <rect x="854" y="726" width="5" height="5" fill="#ffcc44" opacity="0.5"/>
      <rect x="914" y="736" width="5" height="5" fill="#ffcc44" opacity="0.7"/>
    </g>

    <!-- Ground plane -->
    <rect x="0" y="820" width="1024" height="204" fill="url(#groundGrad)"/>
    <!-- Ground horizon line glow -->
    <rect x="0" y="818" width="1024" height="4" fill="#3a1e5a" opacity="0.8"/>

    <!-- =================== IRON DOME LAUNCHER =================== -->
    <!-- Base platform -->
    <rect x="155" y="850" width="220" height="18" rx="4" fill="#2a1e40"/>
    <rect x="170" y="840" width="190" height="14" rx="3" fill="#321e4a"/>

    <!-- Truck/vehicle body -->
    <rect x="165" y="800" width="200" height="44" rx="8" fill="#251840"/>
    <rect x="175" y="806" width="180" height="32" rx="6" fill="#2e1e4a"/>
    <!-- Cab section -->
    <rect x="165" y="808" width="60" height="36" rx="5" fill="#1e1435"/>
    <!-- Wheels -->
    <circle cx="205" cy="850" r="18" fill="#1a1030"/>
    <circle cx="205" cy="850" r="10" fill="#251840"/>
    <circle cx="330" cy="850" r="18" fill="#1a1030"/>
    <circle cx="330" cy="850" r="10" fill="#251840"/>

    <!-- Launcher arm / elevation mechanism -->
    <rect x="248" y="750" width="16" height="80" rx="4" fill="#3a2860" transform="rotate(-15, 256, 800)"/>

    <!-- Launcher tubes (4 tubes in 2x2 array) -->
    <!-- Tube array box -->
    <rect x="220" y="700" width="110" height="90" rx="8" fill="url(#tubeGrad)" transform="rotate(-15, 275, 745)"/>
    <!-- Individual tubes -->
    <rect x="228" y="710" width="44" height="78" rx="6" fill="#1e1535" transform="rotate(-15, 250, 749)"/>
    <rect x="278" y="710" width="44" height="78" rx="6" fill="#221840" transform="rotate(-15, 300, 749)"/>
    <!-- Tube openings (circles) -->
    <ellipse cx="252" cy="714" rx="18" ry="8" fill="#0d0820" transform="rotate(-15, 252, 714)"/>
    <ellipse cx="302" cy="714" rx="18" ry="8" fill="#0d0820" transform="rotate(-15, 302, 714)"/>
    <ellipse cx="252" cy="756" rx="18" ry="8" fill="#130d25" transform="rotate(-15, 252, 756)"/>
    <ellipse cx="302" cy="756" rx="18" ry="8" fill="#130d25" transform="rotate(-15, 302, 756)"/>

    <!-- =================== RADAR DISH =================== -->
    <!-- Radar mast -->
    <rect x="750" y="720" width="14" height="120" rx="3" fill="#2a1e40"/>
    <!-- Radar dish -->
    <ellipse cx="757" cy="718" rx="55" ry="22" fill="url(#radarGrad)" opacity="0.9"/>
    <ellipse cx="757" cy="718" rx="55" ry="22" fill="none" stroke="#4a3a6a" stroke-width="2"/>
    <!-- Radar dish grid lines -->
    <line x1="702" y1="718" x2="812" y2="718" stroke="#3a2d58" stroke-width="1.5" opacity="0.7"/>
    <line x1="757" y1="696" x2="757" y2="740" stroke="#3a2d58" stroke-width="1.5" opacity="0.7"/>
    <line x1="712" y1="704" x2="802" y2="732" stroke="#3a2d58" stroke-width="1" opacity="0.4"/>
    <line x1="712" y1="732" x2="802" y2="704" stroke="#3a2d58" stroke-width="1" opacity="0.4"/>
    <!-- Radar active scan glow -->
    <ellipse cx="757" cy="718" rx="55" ry="22" fill="none" stroke="#00cfff" stroke-width="1.5" opacity="0.4"/>
    <!-- Radar scan line -->
    <line x1="757" y1="718" x2="810" y2="700" stroke="#00ffcc" stroke-width="2.5" opacity="0.7"/>
    <!-- Radar base -->
    <rect x="730" y="836" width="54" height="20" rx="4" fill="#2a1e40"/>

    <!-- =================== RADAR SWEEP RINGS =================== -->
    <circle cx="757" cy="718" r="80" fill="none" stroke="#00cfff" stroke-width="1" opacity="0.12"/>
    <circle cx="757" cy="718" r="130" fill="none" stroke="#00cfff" stroke-width="0.8" opacity="0.08"/>

    <!-- =================== THREAT MISSILE (incoming from top-right) =================== -->
    <g filter="url(#glowRed)">
      <!-- Trail -->
      <polygon points="610,90 630,90 720,340 680,340" fill="url(#threatTrail)" opacity="0.85"/>
      <!-- Extra glow trail -->
      <polygon points="614,90 626,90 715,340 685,340" fill="#ff4400" opacity="0.3"/>
      <!-- Missile body -->
      <g transform="rotate(32, 665, 210)">
        <rect x="655" y="155" width="22" height="70" rx="6" fill="#cc2200"/>
        <rect x="655" y="155" width="22" height="70" rx="6" fill="none" stroke="#ff4400" stroke-width="1.5" opacity="0.6"/>
        <!-- Nosecone -->
        <polygon points="655,155 677,155 666,128" fill="#ff3300"/>
        <!-- Fins -->
        <polygon points="655,215 642,235 655,225" fill="#aa1800"/>
        <polygon points="677,215 690,235 677,225" fill="#aa1800"/>
      </g>
    </g>

    <!-- =================== INTERCEPTOR MISSILE (launched from launcher) =================== -->
    <g filter="url(#glowBlue)">
      <!-- Trail -->
      <polygon points="248,740 268,740 490,340 470,340" fill="url(#interceptorTrail)" opacity="0.9"/>
      <!-- Bright core trail line -->
      <line x1="258" y1="740" x2="480" y2="340" stroke="#aaeeff" stroke-width="3" opacity="0.7"/>
      <!-- Missile body -->
      <g transform="rotate(-58, 390, 490)">
        <rect x="380" y="445" width="18" height="64" rx="5" fill="#0090cc"/>
        <rect x="380" y="445" width="18" height="64" rx="5" fill="none" stroke="#00cfff" stroke-width="1.5" opacity="0.8"/>
        <!-- Nosecone -->
        <polygon points="380,445 398,445 389,420" fill="#00ccff"/>
        <!-- Fins -->
        <polygon points="380,499 368,516 380,509" fill="#006699"/>
        <polygon points="398,499 410,516 398,509" fill="#006699"/>
      </g>
    </g>

    <!-- =================== EXPLOSION / INTERCEPT =================== -->
    <g filter="url(#glowExplosion)">
      <!-- Outer explosion bloom -->
      <circle cx="560" cy="330" r="72" fill="url(#explosionGlow)" opacity="0.9"/>
      <!-- Mid ring -->
      <circle cx="560" cy="330" r="42" fill="#ff8800" opacity="0.7"/>
      <!-- Inner bright core -->
      <circle cx="560" cy="330" r="22" fill="#ffee88" opacity="0.95"/>
      <!-- White hot center -->
      <circle cx="560" cy="330" r="10" fill="#ffffff"/>

      <!-- Explosion debris rays -->
      <line x1="560" y1="330" x2="520" y2="275" stroke="#ffcc44" stroke-width="3" opacity="0.8"/>
      <line x1="560" y1="330" x2="610" y2="275" stroke="#ffcc44" stroke-width="2.5" opacity="0.7"/>
      <line x1="560" y1="330" x2="505" y2="340" stroke="#ff8822" stroke-width="2" opacity="0.6"/>
      <line x1="560" y1="330" x2="615" y2="345" stroke="#ff8822" stroke-width="2" opacity="0.6"/>
      <line x1="560" y1="330" x2="540" y2="385" stroke="#ffaa33" stroke-width="2" opacity="0.5"/>
      <line x1="560" y1="330" x2="585" y2="388" stroke="#ffaa33" stroke-width="2" opacity="0.5"/>
      <line x1="560" y1="330" x2="498" y2="305" stroke="#ffdd55" stroke-width="1.5" opacity="0.5"/>
      <line x1="560" y1="330" x2="624" y2="308" stroke="#ffdd55" stroke-width="1.5" opacity="0.5"/>

      <!-- Spark particles -->
      <circle cx="512" cy="268" r="5" fill="#ffee88" opacity="0.9"/>
      <circle cx="614" cy="270" r="4" fill="#ffcc44" opacity="0.8"/>
      <circle cx="498" cy="345" r="3" fill="#ff8844" opacity="0.7"/>
      <circle cx="622" cy="350" r="3" fill="#ff8844" opacity="0.7"/>
      <circle cx="538" cy="392" r="4" fill="#ffaa33" opacity="0.7"/>
      <circle cx="492" cy="298" r="3" fill="#ffe066" opacity="0.6"/>
      <circle cx="630" cy="302" r="3" fill="#ffe066" opacity="0.6"/>
    </g>

    <!-- =================== TOP ALERT BAR =================== -->
    <rect x="0" y="0" width="1024" height="72" fill="#cc1100" opacity="0.92"/>
    <!-- Alert bar texture stripes -->
    <rect x="0" y="0" width="1024" height="72" fill="url(#alertStripes)" opacity="0.15"/>
    <!-- Alert bar bottom edge glow -->
    <rect x="0" y="68" width="1024" height="4" fill="#ff3300" opacity="0.6"/>

    <!-- Alert icon (exclamation triangle) in bar -->
    <polygon points="80,58 110,12 140,58" fill="#ffee00" opacity="0.95"/>
    <rect x="107" y="26" width="6" height="18" rx="2" fill="#cc1100"/>
    <rect x="107" y="48" width="6" height="6" rx="2" fill="#cc1100"/>

    <!-- Hebrew / Alert text -->
    <text x="512" y="50" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="36" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="8" opacity="0.97">RED ALERT</text>

    <!-- Mirror exclamation on right -->
    <polygon points="884,58 914,12 944,58" fill="#ffee00" opacity="0.95"/>
    <rect x="911" y="26" width="6" height="18" rx="2" fill="#cc1100"/>
    <rect x="911" y="48" width="6" height="6" rx="2" fill="#cc1100"/>

    <!-- =================== BOTTOM LABEL BAR =================== -->
    <rect x="0" y="940" width="1024" height="84" fill="#0a0618" opacity="0.88"/>
    <rect x="0" y="940" width="1024" height="3" fill="#3a1e5a" opacity="0.9"/>

    <!-- Iron Dome label -->
    <text x="512" y="990" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="28" font-weight="900" fill="#9966ff" text-anchor="middle" letter-spacing="12" opacity="0.9">IRON DOME</text>
    <!-- Subtitle -->
    <text x="512" y="1014" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#664488" text-anchor="middle" letter-spacing="5" opacity="0.7">MISSILE DEFENSE</text>

  </g>
</svg>
